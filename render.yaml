services:
  - type: web
    name: lumiere-de-vie-pharma
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22
      - key: MONGO_URI
        sync: false
      - key: OWNER_USERNAME
        value: admin
      - key: OWNER_PASSWORD
        sync: false
      - key: STAFF_USERNAME
        value: staff
      - key: STAFF_PASSWORD
        sync: false
      - key: TOKEN_SECRET
        sync: false
      - key: TOKEN_TTL_HOURS
        value: 168
      - key: ALLOW_MANUAL_UPI_CONFIRM
        value: true
  - type: static
    name: lumiere-de-vie-pharma-web
    buildCommand: node scripts/build-static.js
    staticPublishPath: ./web-dist
    pullRequestPreviewsEnabled: true
